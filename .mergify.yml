queue_rules:
  - name: dependabot
    queue_conditions:
      - author=dependabot[bot]
    merge_conditions:
      - author=dependabot[bot]
      - check-success=docker-test (false)
      - check-success=docker-test (true)
      - status-success=hadolint
      - status-success=ruby
      - base=main
    merge_method: squash

pull_request_rules:
  - name: refactored queue action rule
    conditions: []
    actions:
      queue:
